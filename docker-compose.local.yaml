# Local development - Direct connection to Cloud SQL public IP
# No Cloud SQL Proxy needed

services:
  recordtec:
    build:
      context: .
      dockerfile: Dockerfile
    image: recordtec:local
    container_name: recordtec-app
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    restart: unless-stopped

# Usage:
# docker compose -f docker-compose.local.yaml up -d
