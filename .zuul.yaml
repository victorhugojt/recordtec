---
# ===========================================================================
# victorhugojt/recordtec — .zuul.yaml
#
# This repo owns its own CI jobs and decides which run in each pipeline.
# All jobs inherit from "base" defined in zuul-config (the config-project).
# Playbooks live inside THIS repo under playbooks/
# ===========================================================================

- job:
    name: recordtec-lint
    parent: base
    description: Lint the backend codebase
    run: playbooks/smoke.yaml

- job:
    name: recordtec-unit-tests
    parent: base
    description: Run unit tests
    run: playbooks/smoke.yaml

- job:
    name: recordtec-integration-tests
    parent: base
    description: Run integration tests against a live DB
    run: playbooks/smoke.yaml
    timeout: 3600

- job:
    name: recordtec-build
    parent: base
    description: Build the Docker image
    run: playbooks/smoke.yaml

- project:
    merge-mode: squash
    check:
      jobs:
        - recordtec-lint
        - recordtec-unit-tests
        - recordtec-integration-tests
        - recordtec-build
    gate:
      jobs:
        - recordtec-lint
        - recordtec-unit-tests
        - recordtec-integration-tests
        - recordtec-build
